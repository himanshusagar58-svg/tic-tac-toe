<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>tic-tac-toe</title>

      
</head>
<body>
    <script src="script.js" defer> </script> 
    <div id="grid"> 
        <div id="row_1">
            <div class="sq_1 cell"></div>
            <div class="sq_2 cell"></div>
            <div class="sq_3 cell"></div>
        </div>
        <div id="row_2">
            <div class="sq_4 cell"></div>
            <div class="sq_5 cell"></div>
            <div class="sq_6 cell"></div>
        </div>
        <div id="row_3">
            <div class="sq_7 cell"></div>
            <div class="sq_8 cell"></div>
            <div class="sq_9 cell"></div>
        </div>
    </div>
    <button id="cross">Player 1 : CROSS</button>
    <button id="zero">Player 2 : ZERO</button>
    <div class="winner" ></div>

   
   


</body>
</html>
