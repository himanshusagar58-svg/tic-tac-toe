<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>tic-tac-toe</title>

      
</head>
<body>
    <script src="script.js" defer> </script> 
    <div class="Inst">
    <h1>Tic-Tac-Toe</h1>
    <h3>Click on any cell to start. Player 1 has X</h3>
    <h3>Board will reset in 3 seconds after winner is declared</h3>
    </div>
    <div id="grid"> 
        <div id="row_1">
            <div class="sq_1 cell"></div>
            <div class="sq_2 cell"></div>
            <div class="sq_3 cell"></div>
        </div>
        <div id="row_2">
            <div class="sq_4 cell"></div>
            <div class="sq_5 cell"></div>
            <div class="sq_6 cell"></div>
        </div>
        <div id="row_3">
            <div class="sq_7 cell"></div>
            <div class="sq_8 cell"></div>
            <div class="sq_9 cell"></div>
        </div>
    </div>
   
    <div class="winner" ></div>

   
   


</body>
</html>
